name: Auto-Triage Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

concurrency:
  group: triage-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'needs-triage') &&
      !contains(github.event.issue.labels.*.name, 'triaged')

    steps:
      - name: Triage with AI
        uses: actions/github-script@v7
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_BUGTRIAGE }}
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            const PROJECT_ID = 'PVT_kwDODvlY_84BRmQU';
            const STATUS_FIELD_ID = 'PVTSSF_lADODvlY_84BRmQUzg_YSso';
            const PRIORITY_FIELD_ID = 'PVTSSF_lADODvlY_84BRmQUzg_YTuA';
            const STATUS_OPTIONS = {
              'Backlog':     'a9b5279c',
              'Design':      '920a29e4',
              'Triage':      'f0a0aebb',
              'Ready':       '45de947b',
              'In Progress': 'ec09aae4',
              'In Review':   '546b9235',
              'Done':        'df73bb56'
            };
            const PRIORITY_OPTIONS = {
              'priority:urgent': 'ee8aa970',
              'priority:high':   'e5ba6df9',
              'priority:medium': '3f9bcc8d',
              'priority:low':    'a59d52d9'
            };

            async function addToProjectAndSetFields(contentNodeId, statusName, priorityLabel) {
              try {
                const addRes = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      item { id }
                    }
                  }
                `, { projectId: PROJECT_ID, contentId: contentNodeId });
                const itemId = addRes.addProjectV2ItemById.item.id;
                const statusOptionId = STATUS_OPTIONS[statusName];
                if (statusOptionId) {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId, itemId: $itemId,
                        fieldId: $fieldId, value: { singleSelectOptionId: $optionId }
                      }) { projectV2Item { id } }
                    }
                  `, { projectId: PROJECT_ID, itemId, fieldId: STATUS_FIELD_ID, optionId: statusOptionId });
                }
                const priorityOptionId = PRIORITY_OPTIONS[priorityLabel];
                if (priorityOptionId) {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId, itemId: $itemId,
                        fieldId: $fieldId, value: { singleSelectOptionId: $optionId }
                      }) { projectV2Item { id } }
                    }
                  `, { projectId: PROJECT_ID, itemId, fieldId: PRIORITY_FIELD_ID, optionId: priorityOptionId });
                }
                return itemId;
              } catch (e) {
                console.log(`addToProjectAndSetFields failed: ${e.message}`);
                return null;
              }
            }

            async function createPhaseIssue(title, body, labels, assignee) {
              const payload = { title, body, labels };
              if (assignee) payload.assignees = [assignee];
              const res = await fetch(`https://api.github.com/repos/TractionBD/bd4-intake/issues`, {
                method: 'POST',
                headers: {
                  'Accept': 'application/vnd.github.v3+json',
                  'Authorization': `token ${process.env.CROSS_REPO_TOKEN}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
              });
              if (!res.ok) {
                const err = await res.text();
                throw new Error(`Failed to create phase issue: ${res.status} ${err}`);
              }
              return res.json();
            }

            async function notifySlack(text) {
              if (!process.env.SLACK_WEBHOOK_URL) return;
              await fetch(process.env.SLACK_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
              });
            }

            const issue = context.payload.issue;
            const issueLabels = issue.labels.map(l => l.name);
            const body = issue.body || '';
            const title = issue.title || '';
            const isFeature = issueLabels.includes('feature');

            // Parse priority from form
            const severityMatch = body.match(/### Severity\s*\n\s*(.+)/);
            const importanceMatch = body.match(/### How important is this to you\?\s*\n\s*(.+)/);
            const severityRaw = severityMatch ? severityMatch[1].trim() : null;
            const importanceRaw = importanceMatch ? importanceMatch[1].trim() : null;
            const severityToPriority = {
              'Blocker (can\'t use the app)': 'priority:urgent',
              'High (major feature broken)': 'priority:high',
              'Critical (blocking my workflow)': 'priority:urgent',
              'Important (would use regularly)': 'priority:medium',
              'Medium (annoying but workaround exists)': 'priority:medium',
              'Nice to have': 'priority:low',
              'Low (cosmetic or minor)': 'priority:low'
            };
            const priorityLabel = severityToPriority[severityRaw] || severityToPriority[importanceRaw] || 'priority:medium';

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, labels: [priorityLabel]
            });

            // Ensure on BD4 board at Triage (idempotent with add-to-project.yml)
            await addToProjectAndSetFields(issue.node_id, 'Triage', priorityLabel);

            // Least-busy frontend dev
            const leastBusyFrontendDev = await (async () => {
              const devs = ['dhairyahp', 'manpreet-rgb'];
              const counts = {};
              for (const dev of devs) {
                try {
                  const r = await github.graphql(
                    `query($login:String!){user(login:$login){issues(first:100,states:OPEN,filterBy:{assignee:$login}){totalCount}}}`,
                    { login: dev }
                  );
                  counts[dev] = r.user.issues.totalCount;
                } catch (_) { counts[dev] = 0; }
              }
              return counts[devs[0]] <= counts[devs[1]] ? devs[0] : devs[1];
            })();

            const provider = process.env.LLM_PROVIDER || 'openai';

            const SYSTEM_PROMPT = [
              'You are a triage assistant for BD4, a professional CRM mobile app.',
              '',
              'Classify each issue as simple or complex.',
              '',
              'SIMPLE (no sub-issues):',
              '- Any bug - bugs are ALWAYS simple, never complex',
              '- Small, well-scoped feature that one developer can implement end-to-end',
              '- Clear scope from description alone',
              '',
              'COMPLEX (use phases - features only, never bugs):',
              '- Large feature requiring distinct sequential work stages that different people own at different times',
              '- Example phases: "Phase 1: Design & Spec", "Phase 2: Backend API", "Phase 3: Mobile UI"',
              '- Only split into phases when there are genuine sequential dependencies',
              '- Minimum 3+ phases to qualify as complex; if you are not sure, default to simple',
              '',
              'ASSIGNMENT:',
              '- Backend/API work -> "kul-pointe"',
              '- Mobile UI work -> use the frontend dev specified in the prompt',
              '- Design-needed -> "sreenidhi-proddesign"',
              '- Mixed feature (multiple areas) -> assign to whoever does Phase 1',
              '',
              'DESIGN CHECK:',
              '- needsDesign: true only for NEW screens, NEW UI flows, or significant layout redesigns',
              '- Bug fixes, text changes, API work -> needsDesign: false',
              '- designAttached: true if Figma links or mockups are present in the description',
              '',
              'Respond with ONLY valid JSON, no markdown fences:',
              '{',
              '  "complexity": "simple" | "complex",',
              '  "needsDesign": true | false,',
              '  "designAttached": true | false,',
              '  "confidence": "high" | "medium" | "low",',
              '  "primaryAssignee": "github-username",',
              '  "reasoning": "one concise sentence",',
              '  "phases": [',
              '    { "title": "Phase N: short name", "description": "what needs to be done", "assignee": "github-username" }',
              '  ]',
              '}',
              'Note: "phases" is only required when complexity === "complex". Omit or use [] when simple.'
            ].join('\n');

            const USER_PROMPT = `Issue #${issue.number}: ${title}\nType: ${isFeature ? 'feature request' : 'bug report'}\nFrontend dev to use if needed: ${leastBusyFrontendDev}\n\nDescription:\n${body}`;

            let triage;
            try {
              let aiResponse;
              if (provider === 'anthropic') {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': process.env.ANTHROPIC_API_KEY,
                    'anthropic-version': '2023-06-01'
                  },
                  body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1024,
                    system: SYSTEM_PROMPT,
                    messages: [{ role: 'user', content: USER_PROMPT }]
                  })
                });
                const data = await res.json();
                aiResponse = data.content?.[0]?.text;
              } else {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o',
                    response_format: { type: 'json_object' },
                    messages: [
                      { role: 'system', content: SYSTEM_PROMPT },
                      { role: 'user', content: USER_PROMPT }
                    ]
                  })
                });
                const data = await res.json();
                aiResponse = data.choices?.[0]?.message?.content;
              }
              if (!aiResponse) throw new Error('Empty AI response');
              triage = JSON.parse(aiResponse);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `⚠️ **Auto-triage failed** — ${e.message}. Please triage manually.`
              });
              return;
            }

            // Low confidence → flag for human
            if (triage.confidence === 'low') {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `🔍 **Needs human review** — AI confidence is low.\n\n**Reasoning:** ${triage.reasoning}\n\nPlease assign, set priority, and move to Ready manually.`
              });
              await notifySlack(`🔍 *Low confidence triage*\n<${issue.html_url}|bd4-intake#${issue.number}> — ${title}\nNeeds human review.`);
              return;
            }

            // Remove needs-triage label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, name: 'needs-triage'
            }).catch(() => {});

            // Design kickback
            if (triage.needsDesign && !triage.designAttached) {
              await addToProjectAndSetFields(issue.node_id, 'Design', priorityLabel);
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, assignees: ['sreenidhi-proddesign']
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['triaged', 'needs-design']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `📐 **Needs design specs** before development can start.\n\n**Reasoning:** ${triage.reasoning}\n\nAssigned to @sreenidhi-proddesign. Once Figma links or mockups are attached, move back to Triage to resume auto-triage.`
              });
              await notifySlack(`📐 *Needs design*\n<${issue.html_url}|bd4-intake#${issue.number}> — ${title}\nAssigned to @sreenidhi-proddesign`);
              return;
            }

            // SIMPLE path — no sub-issues
            if (triage.complexity === 'simple') {
              await addToProjectAndSetFields(issue.node_id, 'Ready', priorityLabel);
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                assignees: triage.primaryAssignee ? [triage.primaryAssignee] : []
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['triaged']
              });
              const assigneeNote = triage.primaryAssignee ? `@${triage.primaryAssignee}` : 'unassigned';
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Auto-triaged** — ${isFeature ? 'feature' : 'bug'}, assigned to ${assigneeNote}.\n\n**Reasoning:** ${triage.reasoning}\n\nMoved to **Ready** on the BD4 board.\n\n---\n*Triaged by AI (${provider === 'anthropic' ? 'Claude' : 'GPT-4o'})*`
              });
              await notifySlack(`✅ *Auto-triaged*\n<${issue.html_url}|bd4-intake#${issue.number}> — ${title}\nAssigned: ${assigneeNote} · Status: Ready`);
              return;
            }

            // COMPLEX path — create phases in bd4-intake
            const phases = Array.isArray(triage.phases) ? triage.phases : [];
            const phaseLinks = [];
            for (const phase of phases) {
              try {
                const created = await createPhaseIssue(
                  `${title} — ${phase.title}`,
                  `Parent: TractionBD/bd4-intake#${issue.number}\n\n${phase.description || ''}\n\n---\n*Phase auto-created from [bd4-intake#${issue.number}](${issue.html_url})*`,
                  ['phase', priorityLabel],
                  phase.assignee || null
                );
                await addToProjectAndSetFields(created.node_id, 'Backlog', priorityLabel);
                phaseLinks.push(`- [ ] bd4-intake#${created.number} — ${phase.title}${phase.assignee ? ` (@${phase.assignee})` : ''}`);
              } catch (e) {
                console.log(`Failed to create phase "${phase.title}": ${e.message}`);
                phaseLinks.push(`- ⚠️ ${phase.title} — failed to create`);
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, labels: ['triaged', 'tracking']
            });
            await addToProjectAndSetFields(issue.node_id, 'Backlog', priorityLabel);
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ **Auto-triaged** — complex feature, broken into phases (all in bd4-intake).\n\n**Reasoning:** ${triage.reasoning}\n\n## Phases\n${phaseLinks.join('\n')}\n\n---\n*Triaged by AI (${provider === 'anthropic' ? 'Claude' : 'GPT-4o'})*`
            });
            await notifySlack(`✅ *Complex feature triaged (${phases.length} phases)*\n<${issue.html_url}|bd4-intake#${issue.number}> — ${title}\nPhases: ${phases.map(p => p.title).join(', ')}`);
