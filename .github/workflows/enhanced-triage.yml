                      sub.assignee ? [sub.assignee] : []
                    );
                    subIssueLinks.push(`- [ ] TractionBD/${sub.repo}#${created.number} — ${sub.title} (@${sub.assignee})`);
                    await addToProjectAndSetFields(created.node_id, 'Ready', priority);
