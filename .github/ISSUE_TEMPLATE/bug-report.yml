name: Bug Report
description: Report a bug or issue with BD4
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below so we can investigate.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce if possible.
      placeholder: |
        1. I was on the [screen/page]...
        2. I tapped/clicked on...
        3. Then I saw...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should happen?
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Where is the issue?
      options:
        - Mobile App
        - Website
        - Backend / API
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Blocker (can't use the app)
        - High (major feature broken)
        - Medium (annoying but workaround exists)
        - Low (cosmetic or minor)
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Which release should this be fixed in?
      options:
        - MVP
        - v1
        - Unplanned
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images or screen recordings here.
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device / Browser
      description: What device or browser are you using?
      placeholder: "e.g., iPhone 15 / iOS 18, Chrome on Mac"
    validations:
      required: false
